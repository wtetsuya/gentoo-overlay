<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<!-- Generic names -->
    <alias>
		<family>sans-serif</family>
		<prefer>
			<family>HackGen35</family>
			<family>HackGen35 Console</family>
		</prefer>
	</alias>
	<alias>
		<family>monospace</family>
		<prefer>
			<family>HackGen Console</family>
			<family>HackGen</family>
		</prefer>
	</alias>
</fontconfig>
